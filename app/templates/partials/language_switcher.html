{% set return_to = request.url.path + ('?' + request.url.query if request.url.query else '') %}
<form class="lang-switcher" method="post" action="/locale">
  <input type="hidden" name="next" value="{{ return_to }}">
  <label class="sr-only" for="lang-select">{{ t('landing.language_label') }}</label>
  <select id="lang-select" name="lang" onchange="this.form.submit()">
    {% for code in supported_locales %}
      <option value="{{ code }}" {% if code == locale %}selected{% endif %}>{{ t('locale.' ~ code) }}</option>
    {% endfor %}
  </select>
</form>
